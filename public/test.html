<!DOCTYPE html>
<html>
<head>
    <title>Test Background Image</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #333; /* Um cinza médio para contraste */
        }
        .background-div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/assets/background.png'); /* Use o caminho relativo a este HTML */
            background-size: cover;
            background-position: center;
            opacity: 1; /* Opacidade total para ver bem */
            z-index: -1; /* Envie para trás */
        }
        h1 {
            color: white;
            text-align: center;
            padding-top: 100px;
        }
    </style>
</head>
<body>
    <div class="background-div"></div>
    <h1>Background Test Page</h1>
</body>
</html>
